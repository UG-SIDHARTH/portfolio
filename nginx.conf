# SidharthOS - Nginx Reverse Proxy Configuration Template
# Copy this file to `/etc/nginx/sites-available/portfolio` and symlink it to `sites-enabled`

# Redirect www to root apex domain
server {
    listen 80;
    listen [::]:80;
    server_name www.ugsidharth.in; # REPLACE with your www domain
    return 301 http://ugsidharth.in$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name ugsidharth.in; # REPLACE with your root apex domain

    # Log file locations
    access_log /var/log/nginx/portfolio_access.log;
    error_log /var/log/nginx/portfolio_error.log;

    # Reverse proxy requests to Node Express server (port 3500)
    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

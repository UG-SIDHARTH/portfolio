<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake.app - Standing Alone</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07090e;
            --bg-card: rgba(13, 20, 33, 0.45);
            --color-cyan: #00f2fe;
            --color-purple: #7f00ff;
            --text-muted: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CRT scanlines effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .game-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 242, 254, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.8rem 0;
            color: #fff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-stats {
            width: 640px;
            display: flex;
            justify-content: space-between;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--color-cyan);
            margin-bottom: 0.8rem;
            text-shadow: 0 0 4px rgba(0, 242, 254, 0.4);
        }

        #snake-canvas {
            background: #05070a;
            border: 2px solid rgba(0, 242, 254, 0.25);
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.05);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 640px;
            margin-top: 1rem;
        }

        #snake-start-btn {
            padding: 0.6rem 1.8rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-cyan);
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.35);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        #snake-start-btn:hover {
            background: var(--color-cyan);
            color: #000;
            box-shadow: 0 0 10px var(--color-cyan);
        }

        /* Virtual D-pad styles */
        .dpad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .dpad-row {
            display: flex;
            gap: 22px;
        }

        .dpad-btn {
            width: 34px;
            height: 34px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 6px;
            color: var(--color-cyan);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
            outline: none;
        }

        .dpad-btn:hover {
            background: rgba(0, 242, 254, 0.15);
            box-shadow: 0 0 6px rgba(0, 242, 254, 0.3);
        }

        .dpad-btn:active {
            background: var(--color-cyan);
            color: #000;
            box-shadow: 0 0 10px var(--color-cyan);
        }

        .back-link {
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--color-cyan);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>🐍 Snake.app</h1>
        <div class="game-stats">
            <span>SCORE: <span id="snake-score">0</span></span>
            <span id="slow-indicator" style="display: none; color: #ffbd2e; animation: pulse 1s infinite alternate;">SLOW POWER-UP ACTIVE ⚡</span>
            <span>HIGH SCORE: <span id="snake-highscore">0</span></span>
        </div>
        <canvas id="snake-canvas" width="640" height="340"></canvas>
        
        <div class="controls-row">
            <button id="snake-start-btn">START</button>
            
            <div class="dpad-container">
                <button class="dpad-btn" id="snake-dpad-up">▲</button>
                <div class="dpad-row">
                    <button class="dpad-btn" id="snake-dpad-left">◀</button>
                    <button class="dpad-btn" id="snake-dpad-right">▶</button>
                </div>
                <button class="dpad-btn" id="snake-dpad-down">▼</button>
            </div>
        </div>

        <a href="/" class="back-link">&larr; Return to OS</a>
    </div>

    <script>
        const snakeCanvas = document.getElementById('snake-canvas');
        const snakeScoreVal = document.getElementById('snake-score');
        const snakeHighscoreVal = document.getElementById('snake-highscore');
        const snakeStartBtn = document.getElementById('snake-start-btn');
        const slowIndicator = document.getElementById('slow-indicator');
        const dpadUp = document.getElementById('snake-dpad-up');
        const dpadDown = document.getElementById('snake-dpad-down');
        const dpadLeft = document.getElementById('snake-dpad-left');
        const dpadRight = document.getElementById('snake-dpad-right');

        const snakeCtx = snakeCanvas.getContext('2d');
        let snake = [];
        let foods = []; // Multiple food items array
        let obstacles = [];
        let dx = 20;
        let dy = 0;
        let score = 0;
        let highscore = localStorage.getItem('snake_highscore') || 0;
        let gameInterval = null;
        let gameRunning = false;
        let slowTicks = 0; // Ticks of active slow power-up
        const gridSize = 20;

        // Symmetric twin walls layout matching the screenshot
        const obstacleCoords = [
            // Left L-shapes
            { x: 1, y: 4 }, { x: 1, y: 5 }, { x: 2, y: 5 },
            { x: 1, y: 11 }, { x: 1, y: 12 }, { x: 2, y: 11 },
            
            // Vertical extensions from top/bottom borders
            { x: 6, y: 1 }, { x: 6, y: 2 }, { x: 6, y: 3 },
            { x: 6, y: 13 }, { x: 6, y: 14 }, { x: 6, y: 15 },
            
            // Middle single blocks
            { x: 4, y: 8 }, { x: 9, y: 3 }, { x: 9, y: 13 }, { x: 9, y: 8 },
            
            // Left dash box L-brackets
            { x: 7, y: 6 }, { x: 7, y: 7 }, { x: 8, y: 6 },
            { x: 11, y: 6 }, { x: 12, y: 6 }, { x: 12, y: 7 },
            { x: 7, y: 10 }, { x: 7, y: 9 }, { x: 8, y: 10 },
            { x: 11, y: 10 }, { x: 12, y: 10 }, { x: 12, y: 9 },
            
            // Central dividing block
            { x: 15, y: 8 },
            
            // Right L-brackets near center
            { x: 18, y: 4 }, { x: 18, y: 5 }, { x: 17, y: 5 },
            { x: 18, y: 12 }, { x: 18, y: 11 }, { x: 17, y: 11 },
            
            // Top-right L-shape
            { x: 23, y: 2 }, { x: 23, y: 3 }, { x: 23, y: 4 }, { x: 24, y: 4 }, { x: 25, y: 4 }, { x: 26, y: 4 },
            
            // Bottom-right L-shape
            { x: 23, y: 14 }, { x: 23, y: 13 }, { x: 23, y: 12 }, { x: 24, y: 12 }, { x: 25, y: 12 }, { x: 26, y: 12 },
            
            // Middle-right cross/T-shape
            { x: 23, y: 6 }, { x: 23, y: 7 }, { x: 23, y: 8 }, { x: 23, y: 9 }, { x: 23, y: 10 },
            { x: 21, y: 8 }, { x: 22, y: 8 }, { x: 24, y: 8 }, { x: 25, y: 8 },
            
            // Rightmost vertical bar
            { x: 28, y: 5 }, { x: 28, y: 6 }, { x: 28, y: 7 }, { x: 28, y: 8 }, { x: 28, y: 9 }, { x: 28, y: 10 }, { x: 28, y: 11 }
        ];

        if (snakeHighscoreVal) snakeHighscoreVal.textContent = highscore;

        function startSnakeGame() {
            if (gameRunning) return;
            gameRunning = true;
            score = 0;
            slowTicks = 0;
            if (slowIndicator) slowIndicator.style.display = 'none';
            snakeScoreVal.textContent = score;
            dx = gridSize;
            dy = 0;
            // Spawn in an open bottom middle area (safe)
            snake = [
                { x: gridSize * 13, y: gridSize * 12 },
                { x: gridSize * 12, y: gridSize * 12 },
                { x: gridSize * 11, y: gridSize * 12 }
            ];
            
            obstacles = obstacleCoords.map(o => ({ x: o.x * gridSize, y: o.y * gridSize }));
            
            foods = [];
            // Spawn initial foods
            spawnInitialFoods();
            
            snakeStartBtn.style.display = 'none';

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateSnakeGame, 200);
        }

        function spawnInitialFoods() {
            // Spawn 3 red, 2 blue, 1 powerup
            for (let i = 0; i < 3; i++) spawnFoodItem('red');
            for (let i = 0; i < 2; i++) spawnFoodItem('blue');
            spawnFoodItem('powerup');
        }

        function spawnFoodItem(type) {
            let foundPos = false;
            let fx = 0, fy = 0;
            
            while (!foundPos) {
                // Spawn inside inner playable area: col 1..30, row 1..15
                fx = (Math.floor(Math.random() * 30) + 1) * gridSize;
                fy = (Math.floor(Math.random() * 15) + 1) * gridSize;
                
                let overlap = false;
                
                // Collision checks
                snake.forEach(part => {
                    if (part.x === fx && part.y === fy) overlap = true;
                });
                obstacles.forEach(obs => {
                    if (obs.x === fx && obs.y === fy) overlap = true;
                });
                foods.forEach(f => {
                    if (f.x === fx && f.y === fy) overlap = true;
                });
                
                if (!overlap) foundPos = true;
            }
            
            foods.push({ x: fx, y: fy, type: type });
        }

        function checkSelfCollision(head) {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function updateSnakeGame() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check border collision (row 0, row 16, col 0, col 31 are borders)
            let borderCollision = false;
            if (head.x < gridSize || head.x >= snakeCanvas.width - gridSize || 
                head.y < gridSize || head.y >= snakeCanvas.height - gridSize) {
                borderCollision = true;
            }

            // Check obstacle collision
            let hitObstacle = false;
            obstacles.forEach(obs => {
                if (head.x === obs.x && head.y === obs.y) hitObstacle = true;
            });

            if (borderCollision || checkSelfCollision(head) || hitObstacle) {
                endSnakeGame();
                return;
            }

            snake.unshift(head);

            // Check food collision
            let eatenIdx = -1;
            for (let i = 0; i < foods.length; i++) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    eatenIdx = i;
                    break;
                }
            }

            if (eatenIdx > -1) {
                const eatenFood = foods[eatenIdx];
                foods.splice(eatenIdx, 1);
                
                // Apply food consequences
                if (eatenFood.type === 'red') {
                    score += 10;
                } else if (eatenFood.type === 'blue') {
                    score += 20;
                } else if (eatenFood.type === 'powerup') {
                    score += 30;
                    slowTicks = 40; // 40 ticks slow speed boost
                    if (slowIndicator) slowIndicator.style.display = 'inline';
                    
                    // Trigger slow speed cycle
                    clearInterval(gameInterval);
                    gameInterval = setInterval(updateSnakeGame, 280); // Slower loop
                }
                
                snakeScoreVal.textContent = score;
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem('snake_highscore', highscore);
                    snakeHighscoreVal.textContent = highscore;
                }
                
                // Spawn replacement
                spawnFoodItem(eatenFood.type);
            } else {
                snake.pop();
            }

            // Manage slow ticks
            if (slowTicks > 0) {
                slowTicks--;
                if (slowTicks === 0) {
                    if (slowIndicator) slowIndicator.style.display = 'none';
                    // Revert regular speed
                    clearInterval(gameInterval);
                    gameInterval = setInterval(updateSnakeGame, 200);
                }
            }

            // --- DRAW GAME ---
            // 1. Draw Checkerboard (columns 1..30, rows 1..15)
            // Border rows: col 0, col 31, row 0, row 16
            for (let row = 0; row < snakeCanvas.height / gridSize; row++) {
                for (let col = 0; col < snakeCanvas.width / gridSize; col++) {
                    const px = col * gridSize;
                    const py = row * gridSize;
                    
                    if (row === 0 || row === 16 || col === 0) {
                        // Standard Dark grey borders
                        snakeCtx.fillStyle = '#2d2f35';
                        snakeCtx.fillRect(px, py, gridSize, gridSize);
                        snakeCtx.strokeStyle = '#1b1c20';
                        snakeCtx.lineWidth = 0.5;
                        snakeCtx.strokeRect(px, py, gridSize, gridSize);
                    } else if (col === 31) {
                        // Red right-border as shown in the screenshot
                        snakeCtx.fillStyle = '#b32b2b';
                        snakeCtx.fillRect(px, py, gridSize, gridSize);
                        snakeCtx.strokeStyle = '#7c1c1c';
                        snakeCtx.lineWidth = 0.5;
                        snakeCtx.strokeRect(px, py, gridSize, gridSize);
                    } else {
                        // Checkerboard
                        const isEven = (col + row) % 2 === 0;
                        snakeCtx.fillStyle = isEven ? '#aad751' : '#a2d149';
                        snakeCtx.fillRect(px, py, gridSize, gridSize);
                    }
                }
            }

            // 2. Draw Obstacles (Solid Dark Grey Blocks matching reference theme)
            obstacles.forEach(obs => {
                snakeCtx.fillStyle = '#383838';
                snakeCtx.fillRect(obs.x, obs.y, gridSize, gridSize);
                snakeCtx.strokeStyle = '#222';
                snakeCtx.lineWidth = 1;
                snakeCtx.strokeRect(obs.x, obs.y, gridSize, gridSize);
            });

            // 3. Draw Food items
            foods.forEach(f => {
                const centerX = f.x + gridSize / 2;
                const centerY = f.y + gridSize / 2;
                
                if (f.type === 'red' || f.type === 'blue') {
                    // Apple drawing
                    const appleRadius = 7;
                    snakeCtx.fillStyle = f.type === 'red' ? '#e83a14' : '#00f2fe';
                    snakeCtx.beginPath();
                    snakeCtx.arc(centerX, centerY, appleRadius, 0, Math.PI * 2);
                    snakeCtx.fill();
                    
                    // Stem
                    snakeCtx.strokeStyle = '#8b4513';
                    snakeCtx.lineWidth = 1.5;
                    snakeCtx.beginPath();
                    snakeCtx.moveTo(centerX, centerY - appleRadius);
                    snakeCtx.quadraticCurveTo(centerX - 2, centerY - appleRadius - 4, centerX - 1, centerY - appleRadius - 5);
                    snakeCtx.stroke();
                    
                    // Leaf
                    snakeCtx.fillStyle = '#578a34';
                    snakeCtx.beginPath();
                    snakeCtx.ellipse(centerX + 2, centerY - appleRadius - 3, 2.5, 1.5, Math.PI / 4, 0, Math.PI * 2);
                    snakeCtx.fill();
                } else if (f.type === 'powerup') {
                    // Blue Circle with White Up-Arrow
                    snakeCtx.fillStyle = '#4c52e0';
                    snakeCtx.beginPath();
                    snakeCtx.arc(centerX, centerY, 8, 0, Math.PI * 2);
                    snakeCtx.fill();
                    snakeCtx.strokeStyle = '#ffffff';
                    snakeCtx.lineWidth = 1;
                    snakeCtx.stroke();
                    
                    // Arrow triangle inside
                    snakeCtx.fillStyle = '#ffffff';
                    snakeCtx.beginPath();
                    snakeCtx.moveTo(centerX, centerY - 4);
                    snakeCtx.lineTo(centerX - 4, centerY + 2);
                    snakeCtx.lineTo(centerX + 4, centerY + 2);
                    snakeCtx.closePath();
                    snakeCtx.fill();
                }
            });

            // 4. Draw Snake (Smooth capsule-shaped body segments with cute eyes on head)
            snake.forEach((part, idx) => {
                const cx = part.x + gridSize / 2;
                const cy = part.y + gridSize / 2;
                
                if (idx === 0) {
                    // Snake Head (Dark green, slightly larger round circle)
                    snakeCtx.fillStyle = '#467528';
                    snakeCtx.beginPath();
                    snakeCtx.arc(cx, cy, 9.5, 0, Math.PI * 2);
                    snakeCtx.fill();
                    
                    // Eyes looking direction
                    snakeCtx.fillStyle = '#ffffff';
                    let eye1 = {}, eye2 = {};
                    if (dx > 0) {
                        eye1 = { x: cx + 4, y: cy - 4 };
                        eye2 = { x: cx + 4, y: cy + 4 };
                    } else if (dx < 0) {
                        eye1 = { x: cx - 4, y: cy - 4 };
                        eye2 = { x: cx - 4, y: cy + 4 };
                    } else if (dy > 0) {
                        eye1 = { x: cx - 4, y: cy + 4 };
                        eye2 = { x: cx + 4, y: cy + 4 };
                    } else {
                        eye1 = { x: cx - 4, y: cy - 4 };
                        eye2 = { x: cx + 4, y: cy - 4 };
                    }

                    snakeCtx.beginPath();
                    snakeCtx.arc(eye1.x, eye1.y, 2.8, 0, Math.PI * 2);
                    snakeCtx.arc(eye2.x, eye2.y, 2.8, 0, Math.PI * 2);
                    snakeCtx.fill();

                    snakeCtx.fillStyle = '#000000';
                    snakeCtx.beginPath();
                    snakeCtx.arc(eye1.x, eye1.y, 1.2, 0, Math.PI * 2);
                    snakeCtx.arc(eye2.x, eye2.y, 1.2, 0, Math.PI * 2);
                    snakeCtx.fill();
                } else {
                    // Body segments (Rounded medium green circles connecting smoothly)
                    snakeCtx.fillStyle = '#578a34';
                    snakeCtx.beginPath();
                    snakeCtx.arc(cx, cy, 8, 0, Math.PI * 2);
                    snakeCtx.fill();
                    
                    // Darker green outline border
                    snakeCtx.strokeStyle = '#467528';
                    snakeCtx.lineWidth = 1.2;
                    snakeCtx.stroke();
                }
            });
        }

        function endSnakeGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            snakeStartBtn.style.display = 'block';
            snakeStartBtn.textContent = 'RESTART';
            
            snakeCtx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            snakeCtx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);
            snakeCtx.font = '24px "Space Grotesk", sans-serif';
            snakeCtx.fillStyle = '#ff5f56';
            snakeCtx.textAlign = 'center';
            snakeCtx.fillText('GAME OVER', snakeCanvas.width / 2, snakeCanvas.height / 2 - 10);
            snakeCtx.font = '14px "Fira Code", monospace';
            snakeCtx.fillStyle = '#94a3b8';
            snakeCtx.fillText(`SCORE: ${score}`, snakeCanvas.width / 2, snakeCanvas.height / 2 + 25);
        }

        snakeStartBtn.addEventListener('click', startSnakeGame);

        // Keyboard navigation
        window.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }

            if (e.key === 'ArrowUp' && dy === 0) {
                dx = 0; dy = -gridSize;
            } else if (e.key === 'ArrowDown' && dy === 0) {
                dx = 0; dy = gridSize;
            } else if (e.key === 'ArrowLeft' && dx === 0) {
                dx = -gridSize; dy = 0;
            } else if (e.key === 'ArrowRight' && dx === 0) {
                dx = gridSize; dy = 0;
            }
        });

        // Virtual D-pad navigation
        dpadUp.addEventListener('click', () => {
            if (dy === 0) { dx = 0; dy = -gridSize; }
        });
        dpadDown.addEventListener('click', () => {
            if (dy === 0) { dx = 0; dy = gridSize; }
        });
        dpadLeft.addEventListener('click', () => {
            if (dx === 0) { dx = -gridSize; dy = 0; }
        });
        dpadRight.addEventListener('click', () => {
            if (dx === 0) { dx = gridSize; dy = 0; }
        });
    </script>
</body>
</html>
